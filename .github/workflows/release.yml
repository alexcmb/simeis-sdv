name: Release Artifacts
# Le job ne s'exécute que si la PR a été mergée 

on:
  pull_request:

    branches:
      - 'release/**'

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # historique complet, nécessaire pour lister les PRs

      # On extrait la version depuis le nom de la branche : "release/1.2.3" → "1.2.3"
      # Le nom du binaire correspond à prog_name dans le Makefile.
      - name: Extraire la version
        id: version
        run: |
          VERSION="${{ github.event.pull_request.base.ref }}"
          VERSION="${VERSION#release/}"
          echo "version=$VERSION"            >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"               >> "$GITHUB_OUTPUT"
          echo "pkg=simeis_${VERSION}_amd64" >> "$GITHUB_OUTPUT"
          echo "binary=simeis-server"        >> "$GITHUB_OUTPUT"

      # fakeroot permet de builder le .deb avec les bons propriétaires root/root
      - name: Installer fakeroot et lintian
        run: sudo apt-get install -y fakeroot

      # rustup est déjà présent sur les runners GitHub, on s'assure juste
      # d'être sur stable avant de lancer le build.
      - name: Mettre à jour la toolchain Rust stable
        run: |
          rustup update stable
          rustup default stable

      # "make release" exécute :
      #   RUSTFLAGS="-C code-model=kernel -C codegen-units=1" cargo build --release
      #   strip target/release/simeis-server
      - name: Build (make release)
        run: make release

      # Structure attendue par dpkg-deb :
      #   PKG/DEBIAN/              -> control, conffiles, postinst, prerm
      #   PKG/usr/bin/             -> le binaire
      #   PKG/usr/share/man/       -> page de manuel compressée
      #   PKG/usr/share/doc/       -> copyright, changelogs compressés
      #   PKG/etc/systemd/system/  -> le fichier de service
      #
      # Le chmod 755 sur les répertoires est obligatoire selon la Debian Policy.
      - name: Créer l'arborescence du paquet Debian
        run: |
          PKG="${{ steps.version.outputs.pkg }}"
          mkdir -p "${PKG}/DEBIAN"
          mkdir -p "${PKG}/usr/bin"
          mkdir -p "${PKG}/usr/share/man/man1"
          mkdir -p "${PKG}/usr/share/doc/simeis"
          mkdir -p "${PKG}/etc/systemd/system"
          find "${PKG}" -type d | xargs chmod 755

      - name: Copier le binaire compilé
        run: |
          PKG="${{ steps.version.outputs.pkg }}"
          BIN="${{ steps.version.outputs.binary }}"
          cp "target/release/${BIN}" "${PKG}/usr/bin/${BIN}"
          chmod 755 "${PKG}/usr/bin/${BIN}"

      # La dépendance à cmatrix n'est pas fonctionnelle, c'est juste pour
      # pratiquer le champ Depends (point 5 du TP).
      # libc6 est nécessaire car le binaire Rust est lié dynamiquement à la libc.
      # La section "utils" est requise (lintian rejette "base").
      # La description ne doit pas commencer par le nom du paquet.
      - name: Générer DEBIAN/control
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PKG="${{ steps.version.outputs.pkg }}"
          cat > "${PKG}/DEBIAN/control" <<EOF
          Package: simeis
          Version: ${VERSION}-1
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: libc6, cmatrix
          Maintainer: hello@hello.com
          Description: Serveur de demonstration CI/CD
          EOF

      # Tout fichier sous /etc doit être déclaré comme conffile.
      # mais on le garde pour être explicite.
      # Tout fichier dans /etc doit être listé dans conffiles pour que dpkg
      # sache qu'il ne doit pas l'écraser lors d'une mise à jour.
      - name: Générer DEBIAN/conffiles
        run: |
          PKG="${{ steps.version.outputs.pkg }}"
          echo "/etc/systemd/system/simeis.service" > "${PKG}/DEBIAN/conffiles"

      # Exécuté après l'installation du paquet.
      # Crée l'utilisateur système "simeis" s'il n'existe pas, puis démarre le service.
      - name: Générer DEBIAN/postinst
        run: |
          PKG="${{ steps.version.outputs.pkg }}"
          BIN="${{ steps.version.outputs.binary }}"
          cat > "${PKG}/DEBIAN/postinst" <<EOF
          #!/bin/sh
          set -e

          if ! id -u simeis > /dev/null 2>&1; then
            useradd --system --no-create-home --shell /usr/sbin/nologin simeis
          fi

          chown root:root /usr/bin/${BIN}
          chmod 755       /usr/bin/${BIN}

          systemctl daemon-reload
          systemctl enable simeis.service
          systemctl start  simeis.service
          EOF
          chmod 755 "${PKG}/DEBIAN/postinst"

      # Exécuté avant la désinstallation du paquet.
      # On utilise un heredoc avec quotes sur EOF pour éviter l'expansion
      # des variables shell à l'intérieur du script.
      - name: Générer DEBIAN/prerm
        run: |
          PKG="${{ steps.version.outputs.pkg }}"
          cat > "${PKG}/DEBIAN/prerm" <<'EOF'
          #!/bin/sh
          set -e

          if [ "$1" = "remove" ] || [ "$1" = "upgrade" ]; then
            systemctl stop    simeis.service || true
            systemctl disable simeis.service || true
          fi
          EOF
          chmod 755 "${PKG}/DEBIAN/prerm"

      # La page de manuel doit être compressée avec gzip --best -n,
      # -n supprime le timestamp pour éviter l'erreur lintian
      # "package-contains-timestamped-gzip".
      - name: Générer la page de manuel simeis-server.1
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PKG="${{ steps.version.outputs.pkg }}"
          DATE=$(date +'%B %Y')
          cat > /tmp/simeis-server.1 <<EOF
          .\" Page de manuel pour simeis-server.
          .\" Contacter votre@email.com pour corriger les erreurs ou typos.
          .TH SIMEIS-SERVER 1 "${DATE}" "Simeis ${VERSION}" "User Commands"
          .SH NAME
          simeis-server \- serveur de demonstration CI/CD
          .SH SYNOPSIS
          .B simeis-server
          [\fIOPTIONS\fR]
          .SH DESCRIPTION
          .B simeis-server
          est le serveur de l'application Simeis, developpee dans le cadre
          du cours CI/CD (Litchi Pi 2026). Compile en Rust, il tourne comme
          service systemd sous l'utilisateur non-privilegie
          .IR simeis .
          .SH OPTIONS
          .TP
          .B \-h, \-\-help
          Affiche l'aide et quitte.
          .TP
          .B \-v, \-\-version
          Affiche la version et quitte.
          .SH FILES
          .I /etc/systemd/system/simeis.service
          Fichier de service systemd.
          .SH SEE ALSO
          .BR systemctl (1),
          .BR cmatrix (1),
          .BR useradd (8)
          .SH BUGS
          Aucun bug connu pour le moment.
          .SH AUTHOR
          hello@hello.com
          .SH COPYRIGHT
          Distribue sous licence CC BY-NC \- Litchi Pi 2026
          EOF
          gzip --best -n -c /tmp/simeis-server.1 \
            > "${PKG}/usr/share/man/man1/simeis-server.1.gz"

      # sinon lintian remonte "systemd-service-in-odd-location".
      - name: Générer simeis.service
        run: |
          PKG="${{ steps.version.outputs.pkg }}"
          BIN="${{ steps.version.outputs.binary }}"
          cat > "${PKG}/etc/systemd/system/simeis.service" <<EOF
          [Unit]
          Description=Simeis CI/CD demo server
          After=network.target

          [Service]
          Type=simple
          User=simeis
          ExecStart=/usr/bin/${BIN}
          Restart=on-failure
          RestartSec=5s

          [Install]
          WantedBy=multi-user.target
          EOF

      # Les trois fichiers de doc sont obligatoires pour passer lintian :
      # copyright, changelog.gz et changelog.Debian.gz.
      # -n sur gzip supprime le timestamp embarqué dans le fichier compressé.
      # Le copyright doit contenir une ligne "Copyright (C)" explicite.
      # Le changelog.Debian doit respecter le format Debian strict.
      - name: Générer les fichiers de documentation
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PKG="${{ steps.version.outputs.pkg }}"
          DATE=$(date +'%Y-%m-%d')
          RFC_DATE=$(date -R)

          # La ligne "Copyright (C)" est obligatoire pour éviter
          # l'avertissement "copyright-without-copyright-notice".
          cat > "${PKG}/usr/share/doc/simeis/copyright" <<EOF
          Format: https://www.debian.org/doc/packaging-manuals/copyright-format/1.0/
          Upstream-Name: simeis
          Upstream-Contact: Votre Nom <votre@email.com>

          Files: *
          Copyright (C) ${DATE} Votre Nom <votre@email.com>
          License: GPL-3+
           This program is free software: you can redistribute it and/or modify
           it under the terms of the GNU General Public License as published by
           the Free Software Foundation, either version 3 of the License, or
           (at your option) any later version.
           .
           On Debian systems, the full text of the GNU General Public License
           version 3 can be found in /usr/share/common-licenses/GPL-3.
          EOF

          # Le format du changelog Debian est très strict :
          # première ligne : "paquet (version) distribution; urgency=low"
          # entrées indentées de deux espaces avec "  * "
          # ligne de clôture commençant par " -- " avec la date RFC 2822
          cat > /tmp/changelog <<EOF
          simeis (${VERSION}-1) unstable; urgency=low

            * Release ${VERSION} generee automatiquement par la CI.

           -- Votre Nom hello@hello.com  ${RFC_DATE}
          EOF
          gzip --best -n -c /tmp/changelog \
            > "${PKG}/usr/share/doc/simeis/changelog.gz"

          # Le changelog.Debian doit aussi respecter le format Debian.
          cat > /tmp/changelog.Debian <<EOF
          simeis (${VERSION}-1) unstable; urgency=low

            * Maintainer and upstream author are identical.
              See changelog for full history.

           -- Votre Nom hello@hello.com  ${RFC_DATE}
          EOF
          gzip --best -n -c /tmp/changelog.Debian \
            > "${PKG}/usr/share/doc/simeis/changelog.Debian.gz"

      - name: Construire le paquet .deb
        run: |
          PKG="${{ steps.version.outputs.pkg }}"
          fakeroot dpkg-deb --build "${PKG}"
          ls -lh "${PKG}.deb"

      # On récupère les PRs mergées sur la branche release/x et on les classe
      # selon leur branche source : feature/x, bug/x, ou autre.
      - name: Générer le changelog de release
        id: changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          PRS=$(gh pr list \
            --base "${{ github.event.pull_request.base.ref }}" \
            --state merged \
            --json number,title,url,headRefName \
            --limit 100)

          FEATURES=""
          BUGFIXES=""
          OTHERS=""

          while IFS= read -r line; do
            NUMBER=$(echo "$line" | jq -r '.number')
            TITLE=$(echo  "$line" | jq -r '.title')
            URL=$(echo    "$line" | jq -r '.url')
            BRANCH=$(echo "$line" | jq -r '.headRefName')
            ENTRY="- [#${NUMBER}](${URL}) ${TITLE}"

            if [[ "$BRANCH" == feature/* ]]; then
              FEATURES="${FEATURES}${ENTRY}\n"
            elif [[ "$BRANCH" == bug/* ]]; then
              BUGFIXES="${BUGFIXES}${ENTRY}\n"
            else
              OTHERS="${OTHERS}${ENTRY}\n"
            fi
          done < <(echo "$PRS" | jq -c '.[]')

          BODY="## Changelog ${TAG}\n\n"
          [ -n "$FEATURES" ] && BODY="${BODY}### Features\n${FEATURES}\n"
          [ -n "$BUGFIXES" ] && BODY="${BODY}### Bugfix\n${BUGFIXES}\n"
          [ -n "$OTHERS"   ] && BODY="${BODY}### Autre\n${OTHERS}\n"

          printf "%b" "$BODY" > release_changelog.md

      # Les variables multiline ne se passent pas directement en input d'une
      # action GitHub. On utilise la syntaxe heredoc de GITHUB_OUTPUT.
      - name: Exporter le changelog
        id: read_changelog
        run: |
          echo "content<<EOF" >> "$GITHUB_OUTPUT"
          cat release_changelog.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      
      - name: Cache cargo packages
        id: cache-cargo
        uses: actions/cache@v4
        with:
          path: |
              /usr/local/cargo/registry
              /usr/local/cargo/bin
          key: cargo-typst-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - if: ${{ steps.cache-cargo.outputs.cache-hit != 'true' }}        
        name: Install typst
        run: cargo install typst-cli

      - name: genere la documentation
        run: make documentation

      # On utilise l'image prebuilt sur ghcr.io pour éviter le build du
      # Dockerfile de l'action, qui échoue car Debian Buster est en fin de vie
      # et ses dépôts apt ne répondent plus.
            # On build l'image depuis le binaire compilé par make release,
      # puis on vérifie qu'elle démarre correctement avant d'aller plus loin.
      - name: Construire l'image Docker
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          docker build -f .github/Dockerfile -t "simeis-server:${TAG}" .
 
      - name: Tester l'image Docker
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          docker run --rm "simeis-server:${TAG}"

      # comme artefact de la release et la réutiliser sans registry.
      - name: Exporter l'image Docker
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          docker image save "simeis-server:${TAG}" -o "simeis-server_${TAG}.tar"
 
      # On utilise l'image prebuilt sur ghcr.io pour éviter le build du
      # Dockerfile de l'action, qui échoue car Debian Buster est en fin de vie
      # et ses dépôts apt ne répondent plus.
      - name: Créer / mettre à jour la release
        uses: docker://ghcr.io/mini-bomba/create-github-release:v1.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.tag }}"
          body: ${{ steps.read_changelog.outputs.content }}
          files: |
            ${{ steps.version.outputs.pkg }}.deb
            /tmp/simeis-server.1
            doc/manual.pdf
 
          clear_attachments: true
          prerelease: false

#### IMAGE DOCKER

      - name: Build Docker image
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          docker build -f .github/Dockerfile -t "simeis-server:${TAG}" .

      - name: Test Docker image
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          docker run --rm -d -p 8080:8080 --name test-simeis "simeis-server:${TAG}"
          sleep 5
          curl -f http://localhost:8080
          docker stop test-simeis

      - name: Save Docker image
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          docker image save "simeis-server:${TAG}" -o "simeis-server_${TAG}.tar"

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: simeis-server_${TAG}.tar

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Tag and push Docker image
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          docker tag "simeis-server:${TAG}" "${{ secrets.DOCKERHUB_USERNAME }}/simeis-server:${TAG}"
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/simeis-server:${TAG}"