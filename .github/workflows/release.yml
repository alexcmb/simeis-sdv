name: Release cargo
on:
  pull_request:
    types: [closed]
    branches:
      - 'release/*'

jobs:
  build:
    name: cargo build
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    container:
      image: rust:trixie
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo packages
        id: cache-cargo
        uses: actions/cache@v4
        with:
          path: |
              /usr/local/cargo/registry
              /usr/local/cargo/bin
          key: cargo-typst-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - if: ${{ steps.cache-cargo.outputs.cache-hit != 'true' }}        
        name: Install typst
        run: cargo install typst-cli

      - name: build cargo make
        run: make release 
      
      - name: make documentation 
        run: make documentation
      
      - name: Install Debian packaging tools
        run: apt-get update && apt-get install -y fakeroot lintian

      - name: Build Debian package
        run: |
          PACKAGE_NAME="simeis-server"
          VERSION="1.0.0"
          if [[ "${GITHUB_BASE_REF}" == release/* ]]; then
            VERSION=${GITHUB_BASE_REF#release/}
            VERSION=${VERSION#v}
          fi
          
          mkdir -p debian/usr/bin
          mkdir -p debian/usr/share/man/man1
          mkdir -p debian/DEBIAN
          mkdir -p debian/usr/share/doc/$PACKAGE_NAME
          
          find debian -type d -exec chmod 0755 {} \;
          
          cat <<EOF > debian/DEBIAN/control
          Package: $PACKAGE_NAME
          Version: $VERSION
          Section: web
          Priority: optional
          Architecture: amd64
          Maintainer: CI <ci@example.com>
          Description: Simeis Server application
          EOF
          
          cp target/release/simeis-server debian/usr/bin/
          
          cp doc/simeis-server.1 debian/usr/share/man/man1/
          
          echo "Copyright (C) 2026" > debian/usr/share/doc/$PACKAGE_NAME/copyright
          echo "Initial release" > debian/usr/share/doc/$PACKAGE_NAME/changelog
          cp debian/usr/share/doc/$PACKAGE_NAME/changelog debian/usr/share/doc/$PACKAGE_NAME/changelog.Debian
          
          gzip --best -n debian/usr/share/man/man1/simeis-server.1
          gzip --best -n debian/usr/share/doc/$PACKAGE_NAME/copyright
          gzip --best -n debian/usr/share/doc/$PACKAGE_NAME/changelog
          gzip --best -n debian/usr/share/doc/$PACKAGE_NAME/changelog.Debian
          
          fakeroot dpkg-deb --build debian
          
          DEB_FILE="${PACKAGE_NAME}_${VERSION}_amd64.deb"
          mv debian.deb $DEB_FILE
          
          lintian $DEB_FILE || echo "Lintian warnings ignored"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            target/release/simeis-server
            doc/manual.pdf
            *.deb
      
      - name: make clean
        run: make clean

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build
    env:
      TEST_TAG: simeis-server:test
      LATEST_TAG: ${{ vars.DOCKERHUB_USERNAME }}/simeis-server:latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: build-artifacts

      - name: Copy binary to context
        run: |
          mkdir -p target/release
          find build-artifacts -type f -name "simeis-server" -exec cp {} target/release/ \;
          chmod +x target/release/simeis-server

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and export to Docker
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .github/Dockerfile
          load: true
          tags: ${{ env.TEST_TAG }}

      - name: Save Docker image as tar
        run: docker save -o simeis-docker-image.tar ${{ env.TEST_TAG }}

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: simeis-docker-image.tar

      - name: Test
        run: |
          docker run -d --name test_container ${{ env.TEST_TAG }}
          sleep 3
          docker logs test_container
          docker stop test_container

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .github/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.LATEST_TAG }}

  publish_release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build, docker]
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: build-artifacts

      - name: Download docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: build-artifacts

      - name: Generate Changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_LIST=$(gh pr list --state merged --base '${{ github.base_ref }}' --json title,url,headRefName)
          
          FEATURES=$(echo "$PR_LIST" | jq -r '.[] | select(.headRefName | startswith("feature/")) | "- [\(.title)](\(.url))"')
          BUGFIXES=$(echo "$PR_LIST" | jq -r '.[] | select(.headRefName | startswith("bug/")) | "- [\(.title)](\(.url))"')
          AUTRES=$(echo "$PR_LIST" | jq -r '.[] | select((.headRefName | startswith("feature/")) or (.headRefName | startswith("bug/")) | not) | "- [\(.title)](\(.url))"')
          
          {
            echo "CHANGELOG<<EOF"
            if [ -n "$FEATURES" ]; then
              echo "### Features"
              echo "$FEATURES"
              echo ""
            fi
            if [ -n "$BUGFIXES" ]; then
              echo "### Bugfix"
              echo "$BUGFIXES"
              echo ""
            fi
            if [ -n "$AUTRES" ]; then
              echo "### Autre"
              echo "$AUTRES"
              echo ""
            fi
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Extract Tag Name
        run: |
          VERSION="${GITHUB_BASE_REF#release/}"
          VERSION="${VERSION#v}"
          TAG_NAME="v$VERSION"
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV

      - name: Explicitly push Git Tag to avoid branch collision
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f ${{ env.TAG_NAME }}
          git push -f origin refs/tags/${{ env.TAG_NAME }}

      - name: Release the new binaries
        uses: docker://ghcr.io/mini-bomba/create-github-release:v1.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ env.TAG_NAME }}
          skip_tag_creation: true
          prerelease: false
          name: "Release ${{ env.TAG_NAME }}"
          body: ${{ env.CHANGELOG }}
          files: |
            build-artifacts/**/simeis-server
            build-artifacts/**/*.pdf
            build-artifacts/**/*.deb
          clear_attachments: true

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: build-artifacts

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY_ALEX }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Copy .deb via SCP
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new -p 22222 alexandre@78.123.114.124 "touch ~/.hushlogin"
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new -P 22222 -O build-artifacts/*.deb alexandre@78.123.114.124:/tmp/

      - name: Install and restart
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new -p 22222 alexandre@78.123.114.124 "ls -lh /tmp/*.deb && sudo dpkg -i /tmp/*.deb && sudo systemctl restart simeis-server"