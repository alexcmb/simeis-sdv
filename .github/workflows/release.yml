name: Release cargo
on:
  pull_request:
    types: [closed]
    branches:
      - 'release/*'

jobs:
  build:
    name: cargo build
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    container:
      image: rust:trixie
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo packages
        id: cache-cargo
        uses: actions/cache@v4
        with:
          path: |
              /usr/local/cargo/registry
              /usr/local/cargo/bin
          key: cargo-typst-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - if: ${{ steps.cache-cargo.outputs.cache-hit != 'true' }}        
        name: Install typst
        run: cargo install typst-cli

      - name: build cargo make
        run: make release 
      
      - name: make documentation 
        run: make documentation
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            target/release/simeis-server
            doc/manual.pdf
      
      - name: make clean
        run: make clean

  publish_release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: build-artifacts

      - name: Release the new binaries
        uses: docker://ghcr.io/mini-bomba/create-github-release:v1.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.base_ref }}
          prerelease: false
          name: "Release ${{ github.base_ref }}"
          body: "Release generated automatically upon merging to ${{ github.base_ref }}"
          files: |
            build-artifacts/**/simeis-server
            build-artifacts/**/*.pdf
          clear_attachments: true

