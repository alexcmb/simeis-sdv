#WILLIAM.
name: Release cargo
on:
  pull_request:
    types: [closed]
    branches:
      - 'release/**'

jobs:
  release:
    name: Build and release
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    container:
      image: rust:trixie
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache cargo packages
        id: cache-cargo
        uses: actions/cache@v4
        with:
          path: |
              /usr/local/cargo/registry
              /usr/local/cargo/bin
              target/
          key: cargo-typst-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - if: ${{ steps.cache-cargo.outputs.cache-hit != 'true' }}        
        name: Install typst
        run: cargo install typst-cli

      - name: build cargo make
        run: make release 
      
      - name: make documentation 
        run: make documentation
    
      # Générer le changelog depuis les PRs mergées
      - name: Generate changelog
        id: changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          apt-get install -y gh jq

          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="release/$VERSION"

          # Récupérer les PRs mergées vers cette branche
          gh pr list --base "$BRANCH" --state merged \
            --json title,url,headRefName > /tmp/prs.json

          FEATURES=""
          BUGS=""
          OTHER=""

          # Trier les PRs par type de branche
          for pr in $(jq -r 'keys[]' /tmp/prs.json); do
            TITLE=$(jq -r ".[$pr].title" /tmp/prs.json)
            URL=$(jq -r ".[$pr].url" /tmp/prs.json)
            HEAD=$(jq -r ".[$pr].headRefName" /tmp/prs.json)

            LINE="- [$TITLE]($URL)"
            case "$HEAD" in
              feature/*) FEATURES="$FEATURES\n$LINE" ;;
              bug/*)     BUGS="$BUGS\n$LINE" ;;
              *)         OTHER="$OTHER\n$LINE" ;;
            esac
          done

          # Écrire le changelog
          {
            echo "notes<<EOF"
            echo "## Changelog"
            [ -n "$FEATURES" ] && echo -e "\n### Features\n$FEATURES"
            [ -n "$BUGS" ]     && echo -e "\n### Bugfix\n$BUGS"
            [ -n "$OTHER" ]    && echo -e "\n### Autre\n$OTHER"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      # Créer la release et uploader les fichiers
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes "${{ steps.changelog.outputs.notes }}" \
            ./target/release/simeis \
            ./manual.pdf