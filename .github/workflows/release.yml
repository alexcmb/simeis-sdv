name: Release cargo
on:
  pull_request:
    types: [closed]
    branches:
      - 'release/*'

jobs:
  build:
    name: cargo build
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    container:
      image: rust:trixie
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo packages
        id: cache-cargo
        uses: actions/cache@v4
        with:
          path: |
              /usr/local/cargo/registry
              /usr/local/cargo/bin
          key: cargo-typst-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - if: ${{ steps.cache-cargo.outputs.cache-hit != 'true' }}        
        name: Install typst
        run: cargo install typst-cli

      - name: build cargo make
        run: make release 
      
      - name: make documentation 
        run: make documentation
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            target/release/simeis-server
            doc/manual.pdf
      
      - name: make clean
        run: make clean

  publish_release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: build-artifacts

      - name: Generate Changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_LIST=$(gh pr list --state merged --base '${{ github.base_ref }}' --json title,url,headRefName)
          
          FEATURES=$(echo "$PR_LIST" | jq -r '.[] | select(.headRefName | startswith("feature/")) | "- [\(.title)](\(.url))"')
          BUGFIXES=$(echo "$PR_LIST" | jq -r '.[] | select(.headRefName | startswith("bug/")) | "- [\(.title)](\(.url))"')
          AUTRES=$(echo "$PR_LIST" | jq -r '.[] | select((.headRefName | startswith("feature/")) or (.headRefName | startswith("bug/")) | not) | "- [\(.title)](\(.url))"')
          
          {
            echo "CHANGELOG<<EOF"
            if [ -n "$FEATURES" ]; then
              echo "### Features"
              echo "$FEATURES"
              echo ""
            fi
            if [ -n "$BUGFIXES" ]; then
              echo "### Bugfix"
              echo "$BUGFIXES"
              echo ""
            fi
            if [ -n "$AUTRES" ]; then
              echo "### Autre"
              echo "$AUTRES"
              echo ""
            fi
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Extract Tag Name
        run: |
          VERSION="${GITHUB_BASE_REF#release/}"
          VERSION="${VERSION#v}"
          TAG_NAME="v$VERSION"
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV

      - name: Explicitly push Git Tag to avoid branch collision
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f ${{ env.TAG_NAME }}
          git push -f origin refs/tags/${{ env.TAG_NAME }}

      - name: Release the new binaries
        uses: docker://ghcr.io/mini-bomba/create-github-release:v1.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ env.TAG_NAME }}
          skip_tag_creation: true
          prerelease: false
          name: "Release ${{ env.TAG_NAME }}"
          body: ${{ env.CHANGELOG }}
          files: |
            build-artifacts/**/simeis-server
            build-artifacts/**/*.pdf
          clear_attachments: true

