#WILLIAM
name: deploy new release
on:
  push:
jobs:
  ssh:
    name: connexion-ssh
    runs-on: ubuntu-latest
    steps:
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_WILLIAM }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa

        ssh-keyscan -p ${{ secrets.HOST_PORT }} ${{ secrets.HOST_IP }} >> ~/.ssh/known_hosts
  
    - name: test key
      run: cat ~/.ssh/known_hosts

    - name: Check port reachability
      run: nc -zv ${{ secrets.HOST_IP }} ${{ secrets.HOST_PORT }}

    - name: connexion ssh
      run: |
        ssh -i ~/.ssh/id_rsa \
          -p ${{ secrets.HOST_PORT }} \
          william@${{ secrets.HOST_IP }} \
          "echo OK"
      