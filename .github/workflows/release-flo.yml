name: Auto Release


on:
  pull_request:
    branches:
      - 'release/**'
  push:
    branches:
      - 'release/**'

permissions:
  contents: write
  pull-requests: read
  actions: read

jobs:
  release:
    # ✅ déclenche seulement si PR mergée OU push direct
    if: github.event.pull_request.merged == true || github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      # 📥 Nom de branche correct selon event
      - name: Extract branch
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "branch=${GITHUB_BASE_REF}" >> $GITHUB_OUTPUT
          else
            echo "branch=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      # 📦 Télécharger artefacts du workflow existant
      - name: Download artifacts
        uses: dawidd6/action-download-artifact@v3
        with:
          name: build-artifacts
          workflow: Release cargo
          branch: ${{ steps.vars.outputs.branch }}
          path: artifacts

      # 🕒 Dernière release
      - name: Get last release
        id: last_release
        uses: actions/github-script@v7
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 1
            });

            core.setOutput(
              "date",
              releases.data.length ? releases.data[0].published_at : null
            );

      # 📊 PR mergées dans la branche release
      - name: Get merged PRs
        id: prs
        uses: actions/github-script@v7
        with:
          script: |
            const since = "${{ steps.last_release.outputs.date }}";

            const prs = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "closed",
              base: "${{ steps.vars.outputs.branch }}",
              per_page: 100
            });

            const merged = prs.filter(pr =>
              pr.merged_at &&
              (!since || new Date(pr.merged_at) > new Date(since))
            );

            return JSON.stringify(merged);

      # 📝 Changelog (CORRIGÉ)
      - name: Generate changelog
        id: changelog
        uses: actions/github-script@v7
        with:
          script: |
            const prs = JSON.parse(`${{ steps.prs.outputs.result }}`);

            let features = [];
            let bugfixes = [];
            let others = [];

            for (const pr of prs) {
              const line = `- [${pr.title}](${pr.html_url})`;

              if (pr.head.ref.startsWith("feature/")) {
                features.push(line);
              } else if (pr.head.ref.startsWith("bug/")) {
                bugfixes.push(line);
              } else {
                others.push(line);
              }
            }

            const body = `
## 🚀 Features
${features.join("\n") || "Aucune"}

## 🐛 Bugfixes
${bugfixes.join("\n") || "Aucun"}

## 🔧 Autres
${others.join("\n") || "Aucun"}
`;

            core.setOutput("body", body);

      # 🚀 Release
      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.branch }}
          name: Release ${{ steps.vars.outputs.branch }}
          body: ${{ steps.changelog.outputs.body }}
          files: artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}