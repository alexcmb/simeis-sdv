name: Auto Release

on:
  pull_request:
    branches:
      - 'release/**'

jobs:
  build:
    name: Build project
    runs-on: ubuntu-latest
    container:
      image: rust:trixie

    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        id: cache-cargo
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/cargo/registry
            /usr/local/cargo/bin
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install typst
        if: ${{ steps.cache-cargo.outputs.cache-hit != 'true' }}
        run: cargo install typst-cli

      - name: Build release
        run: make release

      - name: Generate documentation
        run: make documentation

      - name: Clean
        run: make clean

      - name: Debug files
        run: |
          echo "=== TARGET ==="
          ls -R target || true
          echo "=== DOCS ==="
          ls -R docs || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            target/release/*

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: artifacts

      - name: Extract branch
        id: vars
        run: echo "branch=${GITHUB_BASE_REF}" >> $GITHUB_OUTPUT

      - name: Get last release
        id: last_release
        uses: actions/github-script@v7
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 1
            });

            core.setOutput(
              "date",
              releases.data.length ? releases.data[0].published_at : ""
            );

      - name: Get merged PRs
        id: prs
        uses: actions/github-script@v7
        with:
          script: |
            const since = "${{ steps.last_release.outputs.date }}";

            const prs = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "closed",
              base: "${{ github.base_ref }}",
              per_page: 100
            });

            const merged = prs.filter(pr =>
              pr.merged_at &&
              (!since || new Date(pr.merged_at) > new Date(since))
            );

            core.setOutput("prs", JSON.stringify(merged));

      - name: Generate changelog
        id: changelog
        uses: actions/github-script@v7
        with:
          script: |
            const prs = JSON.parse(`${{ steps.prs.outputs.prs }}`);

            let features = [];
            let bugfixes = [];
            let others = [];

            for (const pr of prs) {
              const line = "- [" + pr.title + "](" + pr.html_url + ")";

              if (pr.head.ref.startsWith("feature/")) {
                features.push(line);
              } else if (pr.head.ref.startsWith("bug/")) {
                bugfixes.push(line);
              } else {
                others.push(line);
              }
            }

            const body =
              "## Features\n" + (features.join("\n") || "Aucune") + "\n\n" +
              "## Bugfixes\n" + (bugfixes.join("\n") || "Aucun") + "\n\n" +
              "## Autres\n" + (others.join("\n") || "Aucun");

            core.setOutput("body", body);

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.branch }}
          name: Release ${{ steps.vars.outputs.branch }}
          body: ${{ steps.changelog.outputs.body }}
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}